<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/pages/linksPage.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/utils/favorites-links.js"></script>
    <title>Favorites Links</title>
</head>
<body id="body">
    <div id="header"></div>
    <main class="favorites-container">
        <section class="favorite-card">
            <h1 class="favorites-title">Add your favorite links 🔗</h1>
            <div class="favorites-form">
                <input type="text" class="input-control" id="urlName" placeholder="Name for your link" autofocus>
                <input type="text" class="input-control" id="url" placeholder="Paste your link here">
                <button class="button-primary" id="addLink">Add link</button>
                <div id="container-favorites-links">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
